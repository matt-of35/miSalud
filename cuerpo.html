<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cuerpo Humano</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--ac:#1D9E75;--bg:#f0f4f2;--card:#fff;--tx:#1a1a1a;--tx2:#666;--bd:rgba(0,0,0,0.09);--t50:#E1F5EE;--t100:#9FE1CB;--t400:#1D9E75;--t600:#0F6E56;--t800:#085041;--r50:#FCEBEB;--r400:#E24B4A;--r800:#791F1F;--a50:#FAEEDA;--a400:#BA7517;--a800:#633806;--b50:#E6F1FB;--b400:#378ADD;--b800:#0C447C;--g400:#888780;}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg);}
.hdr{background:var(--ac);color:#fff;padding:calc(env(safe-area-inset-top,0px)+14px) 20px 18px;flex-shrink:0;}
.hdr h1{font-size:20px;font-weight:600;}
.hdr p{font-size:12px;opacity:.82;margin-top:2px;}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.bk{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;}
.crv{background:var(--ac);height:18px;flex-shrink:0;position:relative;}
.crv::after{content:'';position:absolute;bottom:0;left:0;right:0;height:18px;background:var(--bg);border-radius:18px 18px 0 0;}
.cnt{flex:1;overflow-y:auto;padding:14px 14px 30px;-webkit-overflow-scrolling:touch;}
.card{background:var(--card);border-radius:14px;border:.5px solid var(--bd);padding:14px;margin-bottom:12px;}
.st{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
/* BODY SVG CONTAINER */
.body-wrap{position:relative;margin:0 auto;width:100%;max-width:340px;}
.body-wrap svg{width:100%;height:auto;}
/* ORGAN OVERLAYS - positioned absolutely over SVG */
.organ-btn{position:absolute;cursor:pointer;border:none;background:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:2px;}
.organ-circle{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .15s;}
.organ-btn:active .organ-circle{transform:scale(.9);}
.organ-label{font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);white-space:nowrap;}
/* DETAIL PANEL */
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);transition:transform .3s;z-index:100;max-height:70vh;overflow-y:auto;}
.panel.open{transform:translateX(-50%) translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;}
.panel-hdr{padding:14px 20px 10px;border-bottom:.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-size:16px;font-weight:600;}
.panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--tx2);}
.panel-body{padding:14px 20px 30px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--bd);}
.stat-row:last-child{border-bottom:none;}
.stat-name{font-size:13px;font-weight:500;}
.stat-sub{font-size:11px;color:var(--tx2);margin-top:1px;}
.stat-val{text-align:right;}
.stat-num{font-size:15px;font-weight:700;}
.stat-unit{font-size:11px;color:var(--tx2);}
.bge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;margin-top:3px;display:inline-block;}
.ok{background:var(--t50);color:var(--t600);}
.wn{background:var(--a50);color:var(--a400);}
.hi{background:var(--r50);color:var(--r400);}
.na{background:#f0f0f0;color:var(--g400);}
/* SCORE RING */
.ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:12px;}
.ring-svg{flex-shrink:0;}
.ring-info .score-num{font-size:28px;font-weight:700;}
.ring-info .score-lbl{font-size:12px;color:var(--tx2);}
/* LEGEND GRID */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);}
.leg-dot{width:12px;height:12px;border-radius:50%;}
/* OVERLAY */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99;display:none;}
.overlay.on{display:block;}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <div class="hdr-row">
    <button class="bk" onclick="window.location='index.html'">&#8592; Volver</button>
    <h1>Cuerpo Humano</h1>
  </div>
  <p>Estado de organos segun tus resultados</p>
</div>
<div class="crv"></div>
<div class="cnt">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Normal</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Atencion</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E24B4A"></div>Critico</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div>Sin datos</div>
  </div>
  <div class="body-wrap" id="body-wrap">
    <!-- Human body SVG + organ buttons rendered by JS -->
  </div>
  <div id="summary-cards" style="margin-top:14px;"></div>
</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-hdr">
    <div class="panel-title" id="panel-title">Organo</div>
    <button class="panel-close" onclick="closePanel()">&#10005;</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>
</div>
<script src="datos.js"></script>
<script>
var SK = APP_SK || 'miSalud_v5';
var D = null;
try { var raw = localStorage.getItem(SK); if(raw) D = JSON.parse(raw); } catch(e) {}
if (!D || !D.results || !D.results.length) {
  D = { results: JSON.parse(JSON.stringify(SEED_RESULTS)), studies: [], ophtho: [], nextId: 120 };
}

var REFS = {
  'Glucosa':{min:70,max:100,unit:'mg/dL'},
  'Colesterol total':{min:0,max:200,unit:'mg/dL'},
  'Colesterol HDL':{min:40,max:60,unit:'mg/dL'},
  'Colesterol LDL':{min:0,max:130,unit:'mg/dL'},
  'Trigliceridos':{min:0,max:150,unit:'mg/dL'},
  'Hemoglobina':{min:13,max:17,unit:'gr/dL'},
  'Hematocrito':{min:41,max:49,unit:'%'},
  'Leucocitos':{min:4.1,max:9.5,unit:'k/uL'},
  'Plaquetas':{min:150,max:350,unit:'k/uL'},
  'Creatinina':{min:0.7,max:1.3,unit:'mg/dL'},
  'Acido urico':{min:3.5,max:7.2,unit:'mg/dL'},
  'SGOT-GOT':{min:5,max:37,unit:'U/L'},
  'SGPT-GPT':{min:16,max:63,unit:'U/L'},
  'GGT':{min:15,max:85,unit:'U/L'},
  'Fosfatasa alcalina':{min:46,max:116,unit:'U/L'},
  'Bilirrubina total':{min:0.3,max:1.2,unit:'mg/dL'},
  'TSH':{min:0.55,max:4.78,unit:'mUI/L'},
  'T4 libre':{min:0.89,max:1.76,unit:'ng/dL'},
  'T4 total':{min:4.5,max:10.9,unit:'ug/dL'},
  'T3 total':{min:0.6,max:1.81,unit:'ng/mL'},
  'Vitamina D':{min:20,max:100,unit:'ng/mL'},
  'Vitamina B12':{min:211,max:911,unit:'pg/mL'},
  'Sodio':{min:136,max:145,unit:'mEq/L'},
  'Potasio':{min:3.5,max:5.1,unit:'mEq/L'},
  'HOMA IR':{min:0,max:2.5,unit:'indice'},
  'Insulina basal':{min:3,max:25,unit:'uUI/mL'}
};

// ORGAN DEFINITIONS
var ORGANS = {
  brain: {
    label:'Cerebro', icon:'&#129504;',
    exams:['Sodio','Potasio','Glucosa'],
    desc:'El cerebro requiere glucosa y electrolitos estables para funcionar correctamente.',
    // Position as % of SVG viewBox
    px:50, py:5
  },
  heart: {
    label:'Corazon', icon:'&#10084;',
    exams:['Colesterol total','Colesterol LDL','Colesterol HDL','Trigliceridos'],
    desc:'El perfil lipidico es el principal indicador de salud cardiovascular.',
    px:38, py:30
  },
  lung: {
    label:'Pulmones', icon:'&#129754;',
    exams:['Hemoglobina','Hematocrito'],
    desc:'La hemoglobina transporta oxigeno en sangre. Niveles bajos indican anemia.',
    px:62, py:30
  },
  liver: {
    label:'Higado', icon:'&#129517;',
    exams:['SGOT-GOT','SGPT-GPT','GGT','Fosfatasa alcalina','Bilirrubina total'],
    desc:'Las transaminasas y GGT son marcadores de inflamacion hepatica.',
    px:38, py:44
  },
  pancreas: {
    label:'Pancreas', icon:'&#127967;',
    exams:['Glucosa','HOMA IR','Insulina basal'],
    desc:'El pancreas regula la glucosa mediante insulina. El HOMA IR mide resistencia insulinica.',
    px:58, py:44
  },
  kidney: {
    label:'Rinones', icon:'&#129386;',
    exams:['Creatinina','Acido urico'],
    desc:'La creatinina es el principal marcador de filtracion renal.',
    px:50, py:57
  },
  thyroid: {
    label:'Tiroides', icon:'&#129419;',
    exams:['TSH','T4 libre','T4 total','T3 total'],
    desc:'La tiroides regula el metabolismo. TSH es el marcador principal.',
    px:50, py:18
  },
  blood: {
    label:'Sangre', icon:'&#129978;',
    exams:['Hemoglobina','Leucocitos','Plaquetas','Hematocrito'],
    desc:'El hemograma evalua los componentes celulares de la sangre.',
    px:80, py:45
  },
  vitamins: {
    label:'Nutricion', icon:'&#127773;',
    exams:['Vitamina D','Vitamina B12'],
    desc:'Vitaminas esenciales para huesos, sistema nervioso e inmunidad.',
    px:20, py:45
  }
};

function getLatest(exam) {
  var items = D.results.filter(function(r){ return r.type==='numeric' && r.exam===exam; });
  if (!items.length) return null;
  items.sort(function(a,b){ return b.date.localeCompare(a.date); });
  return items[0];
}

function getStat(exam, val) {
  var r = REFS[exam]; if(!r) return 'na';
  if (val < r.min || val > r.max) { var p=(val>r.max?(val-r.max)/r.max:(r.min-val)/r.min); return p>0.15?'hi':'wn'; }
  return 'ok';
}

function organStatus(key) {
  var organ = ORGANS[key];
  var statuses = [];
  organ.exams.forEach(function(ex) {
    var lat = getLatest(ex);
    if (lat) statuses.push(getStat(ex, lat.value));
  });
  if (!statuses.length) return 'na';
  if (statuses.indexOf('hi') >= 0) return 'hi';
  if (statuses.indexOf('wn') >= 0) return 'wn';
  return 'ok';
}

function statusColor(s) {
  if (s==='ok') return '#1D9E75';
  if (s==='wn') return '#BA7517';
  if (s==='hi') return '#E24B4A';
  return '#888780';
}

function statusLabel(s) {
  if (s==='ok') return 'Normal';
  if (s==='wn') return 'Atencion';
  if (s==='hi') return 'Critico';
  return 'Sin datos';
}

function fmtDate(d) {
  if (!d) return '--';
  var mo = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var p = d.split('-');
  return p[2]+' '+mo[parseInt(p[1])-1]+' '+p[0];
}

// ============================================================
// RENDER BODY
// ============================================================
function renderBody() {
  var wrap = document.getElementById('body-wrap');
  wrap.innerHTML = '';

  // Human body silhouette SVG
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 200 520');
  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');

  // Body parts in soft gray
  var bodyParts = [
    // Head
    'M 100 10 C 78 10 62 26 62 48 C 62 70 78 86 100 86 C 122 86 138 70 138 48 C 138 26 122 10 100 10 Z',
    // Neck
    'M 88 84 L 88 100 L 112 100 L 112 84 Z',
    // Shoulders and torso
    'M 55 100 C 40 100 28 112 28 128 L 28 260 L 172 260 L 172 128 C 172 112 160 100 145 100 Z',
    // Left arm
    'M 28 128 C 24 128 18 132 16 138 L 10 230 C 10 238 16 244 24 244 L 34 244 L 40 145 Z',
    // Right arm
    'M 172 128 C 176 128 182 132 184 138 L 190 230 C 190 238 184 244 176 244 L 166 244 L 160 145 Z',
    // Left forearm/hand
    'M 10 230 L 8 300 C 8 308 14 314 22 314 L 30 314 L 34 244 Z',
    // Right forearm/hand
    'M 190 230 L 192 300 C 192 308 186 314 178 314 L 170 314 L 166 244 Z',
    // Pelvis/hips
    'M 28 260 L 22 330 L 178 330 L 172 260 Z',
    // Left leg
    'M 22 330 L 18 460 L 80 460 L 88 330 Z',
    // Right leg
    'M 112 330 L 120 460 L 182 460 L 178 330 Z',
    // Left foot
    'M 18 460 L 14 500 C 14 506 20 510 30 510 L 80 510 L 80 460 Z',
    // Right foot
    'M 120 460 L 120 510 L 170 510 C 180 510 186 506 186 500 L 182 460 Z'
  ];

  bodyParts.forEach(function(d) {
    var path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill', '#D3D1C7');
    path.setAttribute('opacity', '0.6');
    svg.appendChild(path);
  });

  wrap.appendChild(svg);

  // Organ overlay buttons
  var wrapRect = {w:wrap.offsetWidth || 300, h:(wrap.offsetWidth||300)*520/200};

  Object.keys(ORGANS).forEach(function(key) {
    var organ = ORGANS[key];
    var s = organStatus(key);
    var color = statusColor(s);

    var btn = document.createElement('button');
    btn.className = 'organ-btn';
    btn.style.cssText = 'left:'+organ.px+'%;top:'+organ.py+'%;transform:translate(-50%,-50%);';

    var circ = document.createElement('div');
    circ.className = 'organ-circle';
    circ.style.background = color;
    circ.innerHTML = organ.icon;

    var lbl = document.createElement('div');
    lbl.className = 'organ-label';
    lbl.textContent = organ.label;

    btn.appendChild(circ);
    btn.appendChild(lbl);
    (function(k){ btn.onclick = function(){ showOrganDetail(k); }; })(key);
    wrap.appendChild(btn);
  });

  // Summary cards
  renderSummaryCards();
}

function renderSummaryCards() {
  var sc = document.getElementById('summary-cards');
  sc.innerHTML = '';

  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="st">Estado por sistema</div>';

  Object.keys(ORGANS).forEach(function(key) {
    var organ = ORGANS[key];
    var s = organStatus(key);
    var hasData = organ.exams.some(function(ex){ return !!getLatest(ex); });

    var row = document.createElement('div');
    row.className = 'stat-row';
    row.style.cursor = 'pointer';

    var left = document.createElement('div');
    left.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px">'+organ.icon+'</span><div><div class="stat-name">'+organ.label+'</div><div style="font-size:11px;color:var(--tx2)">'+organ.exams.slice(0,2).join(', ')+(organ.exams.length>2?'...':'')+'</div></div></div>';

    var right = document.createElement('div');
    right.className = 'stat-val';
    right.innerHTML = '<span class="bge '+(hasData?s:'na')+'">'+statusLabel(hasData?s:'na')+'</span>';

    row.appendChild(left);
    row.appendChild(right);
    (function(k){ row.onclick = function(){ showOrganDetail(k); }; })(key);
    card.appendChild(row);
  });

  // Overall score
  var allStats = Object.keys(ORGANS).map(function(k){ return organStatus(k); });
  var hiCount = allStats.filter(function(s){ return s==='hi'; }).length;
  var wnCount = allStats.filter(function(s){ return s==='wn'; }).length;
  var okCount = allStats.filter(function(s){ return s==='ok'; }).length;
  var total = hiCount+wnCount+okCount;
  var score = total ? Math.round((okCount/total)*100) : 0;
  var scoreColor = score>=80?'#1D9E75':score>=60?'#BA7517':'#E24B4A';

  var scoreCard = document.createElement('div');
  scoreCard.className = 'card';
  scoreCard.style.textAlign = 'center';

  // SVG ring
  var size=80, stroke=8, r=(size-stroke)/2, circ=2*Math.PI*r;
  var dash = (score/100)*circ;
  scoreCard.innerHTML = '<div class="st">Puntuacion general de salud</div><div class="ring-wrap" style="justify-content:center;"><svg class="ring-svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#E5E5E0" stroke-width="'+stroke+'"/><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+scoreColor+'" stroke-width="'+stroke+'" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round" transform="rotate(-90 '+size/2+' '+size/2+')"/></svg><div class="ring-info"><div class="score-num" style="color:'+scoreColor+'">'+score+'%</div><div class="score-lbl">de sistemas</div><div class="score-lbl">en estado normal</div></div></div><div style="display:flex;gap:12px;justify-content:center;font-size:12px;"><span style="color:var(--r400)">'+hiCount+' critico</span><span style="color:var(--a400)">'+wnCount+' atencion</span><span style="color:var(--t400)">'+okCount+' normal</span></div>';

  sc.appendChild(scoreCard);
  sc.appendChild(card);
}

// ============================================================
// ORGAN DETAIL PANEL
// ============================================================
function showOrganDetail(key) {
  var organ = ORGANS[key];
  var s = organStatus(key);

  document.getElementById('panel-title').innerHTML = organ.icon + ' ' + organ.label;

  var body = document.getElementById('panel-body');
  body.innerHTML = '';

  // Status header
  var statusDiv = document.createElement('div');
  statusDiv.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 0 14px;border-bottom:.5px solid var(--bd);';
  var dot = document.createElement('div');
  dot.style.cssText = 'width:16px;height:16px;border-radius:50%;background:'+statusColor(s)+';flex-shrink:0;';
  var stInfo = document.createElement('div');
  stInfo.innerHTML = '<div style="font-size:15px;font-weight:600">'+statusLabel(s)+'</div><div style="font-size:12px;color:var(--tx2);margin-top:2px">'+organ.desc+'</div>';
  statusDiv.appendChild(dot);
  statusDiv.appendChild(stInfo);
  body.appendChild(statusDiv);

  // Exam results
  var examsTitle = document.createElement('div');
  examsTitle.className = 'st';
  examsTitle.style.marginTop = '12px';
  examsTitle.textContent = 'Indicadores';
  body.appendChild(examsTitle);

  organ.exams.forEach(function(ex) {
    var lat = getLatest(ex);
    var ref = REFS[ex];
    var row = document.createElement('div');
    row.className = 'stat-row';

    var left = document.createElement('div');
    left.innerHTML = '<div class="stat-name">'+ex+'</div><div class="stat-sub">'+(ref?'Ref: '+ref.min+'-'+ref.max+' '+ref.unit:'Sin referencia')+'</div>';

    var right = document.createElement('div');
    right.className = 'stat-val';

    if (!lat) {
      right.innerHTML = '<div class="stat-num" style="color:var(--g400)">--</div><span class="bge na">Sin datos</span>';
    } else {
      var es = getStat(ex, lat.value);
      var esCls = es==='ok'?'ok':es==='wn'?'wn':'hi';
      var esLbl = es==='ok'?'Normal':es==='wn'?'Limite':'Elevado';
      right.innerHTML = '<div class="stat-num" style="color:'+statusColor(es)+'">'+lat.value+'</div><div class="stat-unit">'+lat.unit+'</div><span class="bge '+esCls+'">'+esLbl+'</span>';
    }

    row.appendChild(left);
    row.appendChild(right);
    body.appendChild(row);

    // Mini trend bar
    if (lat) {
      var items = D.results.filter(function(r){ return r.type==='numeric'&&r.exam===ex; }).sort(function(a,b){return a.date.localeCompare(b.date);});
      if (items.length > 1 && ref && ref.max < 9000) {
        var barWrap = document.createElement('div');
        barWrap.style.cssText = 'padding:0 0 10px;border-bottom:.5px solid var(--bd);';
        var barInner = document.createElement('div');
        barInner.style.cssText = 'height:6px;border-radius:3px;background:#E5E5E0;position:relative;margin-top:4px;';
        var range = ref.max - ref.min;
        var pct = Math.min(100, Math.max(0, ((lat.value-ref.min)/range)*100));
        var dot2 = document.createElement('div');
        dot2.style.cssText = 'position:absolute;width:12px;height:12px;border-radius:50%;background:'+statusColor(getStat(ex,lat.value))+';top:-3px;left:calc('+pct+'% - 6px);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);';
        barInner.appendChild(dot2);
        var labels = document.createElement('div');
        labels.style.cssText = 'display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-top:2px;';
        labels.innerHTML = '<span>'+ref.min+'</span><span style="color:'+statusColor(getStat(ex,lat.value))+';font-weight:600">'+lat.value+'</span><span>'+ref.max+'</span>';
        barWrap.appendChild(barInner);
        barWrap.appendChild(labels);
        body.appendChild(barWrap);
      }
    }
  });

  // History mini bars
  var anyHistory = organ.exams.some(function(ex){
    return D.results.filter(function(r){ return r.type==='numeric'&&r.exam===ex; }).length > 1;
  });
  if (anyHistory) {
    var histTitle = document.createElement('div');
    histTitle.className = 'st';
    histTitle.style.marginTop = '14px';
    histTitle.textContent = 'Ultimas mediciones';
    body.appendChild(histTitle);

    organ.exams.forEach(function(ex) {
      var items = D.results.filter(function(r){ return r.type==='numeric'&&r.exam===ex; }).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(-5);
      if (items.length < 2) return;
      var maxV = Math.max.apply(null, items.map(function(x){return x.value;}));
      var histRow = document.createElement('div');
      histRow.style.cssText = 'margin-bottom:10px;';
      histRow.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;">'+ex+'</div>';
      var bars = document.createElement('div');
      bars.style.cssText = 'display:flex;gap:4px;align-items:flex-end;height:40px;';
      items.forEach(function(x) {
        var h = Math.max(4, Math.round((x.value/maxV)*38));
        var s2 = getStat(ex, x.value);
        var b = document.createElement('div');
        b.style.cssText = 'flex:1;height:'+h+'px;border-radius:2px 2px 0 0;background:'+statusColor(s2)+';min-width:16px;';
        b.title = x.value+' '+x.unit+' ('+x.date+')';
        bars.appendChild(b);
      });
      var dates2 = document.createElement('div');
      dates2.style.cssText = 'display:flex;gap:4px;margin-top:2px;';
      items.forEach(function(x) {
        var sp = document.createElement('span');
        sp.style.cssText = 'flex:1;text-align:center;font-size:8px;color:var(--tx2);';
        var mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        var p=x.date.split('-');
        sp.textContent = mo[parseInt(p[1])-1]+p[0].slice(2);
        dates2.appendChild(sp);
      });
      histRow.appendChild(bars);
      histRow.appendChild(dates2);
      body.appendChild(histRow);
    });
  }

  document.getElementById('overlay').classList.add('on');
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('panel').classList.remove('open');
}

// ============================================================
// INIT
// ============================================================
renderBody();
</script>
</body>
</html>
